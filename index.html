<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Kelvin Mwenda? 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c0394b; --deep: #7a1525; --blush: #fdeef0;
    --cream: #fffaf8; --gold: #c9952a; --text: #1a0608; --muted: #9a7a80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100vh; background:var(--cream); font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; padding:20px; overflow-x:hidden; }
  body::before { content:''; position:fixed; width:600px; height:600px; background:radial-gradient(circle,#f9c0ca28,transparent 70%); top:-200px; left:-200px; border-radius:50%; pointer-events:none; z-index:0; animation:o1 14s ease-in-out infinite; }
  body::after { content:''; position:fixed; width:500px; height:500px; background:radial-gradient(circle,#c0394b14,transparent 70%); bottom:-150px; right:-150px; border-radius:50%; pointer-events:none; z-index:0; animation:o2 17s ease-in-out infinite; }
  @keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
  @keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,-25px)}}
  .petal{position:fixed;width:10px;height:14px;background:radial-gradient(ellipse at 40% 30%,#f9c0ca,#c0394b55);border-radius:50% 10% 50% 10%;animation:pf linear infinite;pointer-events:none;z-index:0;}
  @keyframes pf{0%{transform:translateY(-20px) rotate(0deg);opacity:.8}100%{transform:translateY(110vh) rotate(400deg);opacity:0}}
  .flower{position:fixed;font-size:22px;animation:ff linear infinite;pointer-events:none;z-index:2;}
  @keyframes ff{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
  .wrapper{width:100%;max-width:560px;position:relative;z-index:10;}
  .card{background:white;border-radius:24px;padding:44px 40px;box-shadow:0 20px 70px rgba(192,57,75,.1),0 4px 20px rgba(0,0,0,.05);animation:cardIn .55s cubic-bezier(.175,.885,.32,1.275) both;}
  @keyframes cardIn{from{transform:scale(.88) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .trail{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;min-height:18px;}
  .trail-dot{width:8px;height:8px;border-radius:50%;background:#f0d8db;transition:background .3s;}
  .trail-dot.done{background:var(--rose);}
  .trail-dot.current{background:var(--gold);transform:scale(1.35);}
  .step-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--rose);font-weight:500;margin-bottom:10px;}
  .divider{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 0 20px;}
  .q-text{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:26px;}
  .q-text em{color:var(--rose);font-style:italic;}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{display:flex;align-items:center;gap:13px;background:var(--blush);border:2px solid transparent;border-radius:14px;padding:13px 17px;cursor:pointer;font-size:.91rem;color:var(--text);transition:all .22s ease;text-align:left;font-family:'DM Sans',sans-serif;}
  .choice:hover{background:#f5d4d8;border-color:var(--rose);transform:translateX(5px);}
  .choice-letter{min-width:28px;height:28px;border-radius:50%;background:white;border:1.5px solid #e0c0c5;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--rose);}
  /* RESULT */
  .result-wrap{text-align:center;}
  .result-emoji{font-size:60px;display:block;margin-bottom:14px;animation:pop .6s cubic-bezier(.175,.885,.32,1.275) both;}
  @keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .result-title{font-family:'Cormorant Garamond',serif;font-size:2.3rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:8px;}
  .result-title em{color:var(--rose);font-style:italic;}
  .steps-count{font-size:.82rem;color:var(--muted);margin:10px 0;letter-spacing:.5px;}
  .result-msg{color:var(--muted);font-size:.93rem;line-height:1.75;margin:14px auto 18px;max-width:400px;}
  .photo-frame{position:relative;margin:22px auto;width:100%;max-width:340px;border-radius:20px;overflow:hidden;box-shadow:0 12px 50px rgba(192,57,75,.25);animation:photoIn .8s .3s cubic-bezier(.175,.885,.32,1.275) both;}
  @keyframes photoIn{from{transform:scale(.7) rotate(-3deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
  .photo-frame img{width:100%;display:block;}
  .photo-caption{background:linear-gradient(135deg,var(--rose),var(--deep));color:white;padding:12px 20px;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;letter-spacing:.5px;}
  .emoji-row{font-size:28px;margin:16px 0;letter-spacing:8px;animation:fadeUp .6s .6s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .result-quote{background:var(--blush);border-radius:14px;padding:18px 22px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--deep);line-height:1.65;margin:18px 0;}
  .btn-retry{background:transparent;border:2px solid var(--rose);color:var(--rose);padding:12px 36px;border-radius:50px;font-family:'Cormorant Garamond',serif;font-size:1rem;cursor:pointer;transition:all .2s;margin-top:4px;}
  .btn-retry:hover{background:var(--blush);}
  .conf{position:fixed;opacity:0;animation:cf 3.5s ease-in forwards;pointer-events:none;z-index:999;border-radius:3px;}
  @keyframes cf{0%{transform:translateY(-50px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  @media(max-width:480px){.card{padding:28px 20px;}.q-text{font-size:1.35rem;}.result-title{font-size:1.9rem;}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="card" id="card">
    <div class="trail" id="trail"></div>
    <p class="step-tag" id="stepTag">Start Here 💌</p>
    <div class="divider"></div>
    <p class="q-text" id="qText"></p>
    <div class="choices" id="choices"></div>
  </div>
</div>
